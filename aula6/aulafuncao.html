<body>
    <script type="text/javascript">
        document.write('Aula de domonstração de otimização de codigo atraves de funções ' + "<br>");

        let cotacaoDolar = 5.19;
        
        /* let valor1 = (100 /cotacaoDollar).toFixed(2).replace('.',',');

        function conversaoRealParaDolar(valor, dolar) {
            return "U$$ " + (valor / dolar).toFixed(2).replace('.', ',') + "<br>";
        }

        function conversaoRealDolar(valor, dolar) {
            document.write("U$$ " + (valor, dolar).toFixed(2).replace(".", ",") + '<br>');
        }

        document.write(conversaoRealParaDolar(5000, cotacaoDolar));
        document.write(conversaoRealParaDolar(10000, cotacaoDolar));
        document.write(conversaoRealParaDolar(25000, cotacaoDolar));

        conversaoRealDolar(10, cotacaoDolar);
        conversaoRealDolar(500, cotacaoDolar);

    </script>
