<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Aula 4</title>
    <meta charset="UTF-8">
</head>

<body>

    <script type="text/javascript">
        alert("Bem vindo a segunda aula de javaScript");
        let nota1 = parseFloat(prompt("Informe a primeira nota: "));
        let nota2 = parseFloat(prompt("Informe a segunda nota: "));

        if (isNaN(nota1) || isNaN(nota2)) {
            alert("Informe apenas numeros!");
        } else {
            let media = (nota1 + nota2) / 2;
            document.write(`A média é: ${media}`);
        }
        document.write(`<br>`);

        let cidade = prompt("Informe sua Cidade: ").toUpperCase();;
        if (cidade == "TAQUARITINGA") {
            document.write(`${cidade} é conhecida pelo seu Carnaval.`);
        } else if (cidade == "MONTE ALTO") {
            document.write(`${cidade} é conhecida pelo seu Museu.`);
        } else if (cidade == "MATAO" || cidade == "MATÃO") {
            document.write(`${cidade} é conhecida por suas industrias.`);
        } else if (cidade == "DOBRADA" || cidade == "GUARIROBA"){
            document.write(`${cidade} é conhecida por sua festa.`)
        }else{
            document.write("Informe uma cidade não identificada!.")
        }

    </script>
</body>

</html>
